name: Deploy Prod Stack

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy main stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_APP_DIR }}

            if [ ! -d backend-pandore-prod/.git ]; then
              git clone --branch main --single-branch https://github.com/BastienSche/backend-pandore.git backend-pandore-prod
            else
              git -C backend-pandore-prod fetch origin
              git -C backend-pandore-prod checkout main
              git -C backend-pandore-prod reset --hard origin/main
            fi

            if [ ! -d frontend-pandore-prod/.git ]; then
              git clone --branch main --single-branch https://github.com/BastienSche/frontend-pandore.git frontend-pandore-prod
            else
              git -C frontend-pandore-prod fetch origin
              git -C frontend-pandore-prod checkout main
              git -C frontend-pandore-prod reset --hard origin/main
            fi

            docker compose up -d --build backend frontend caddy

            # Keep legacy folders in sync during migration.
            if [ -d backend-pandore/.git ]; then
              git -C backend-pandore fetch origin
              git -C backend-pandore checkout main
              git -C backend-pandore reset --hard origin/main
            fi
            if [ -d frontend-pandore/.git ]; then
              git -C frontend-pandore fetch origin
              git -C frontend-pandore checkout main
              git -C frontend-pandore reset --hard origin/main
            fi

            docker image prune -f
